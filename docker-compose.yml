services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutriapp}
      POSTGRES_USER: ${POSTGRES_USER:-nutriapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutriapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@nutriapp.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin1234}
    volumes:
      - ./server:/app          # monta el código fuente en caliente
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  frontend:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./client:/app                   # código fuente en caliente (HMR)
      - frontend_node_modules:/app/node_modules   # deps aisladas del host
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    # bun install solo si node_modules no existe o package.json cambió
    command: sh -c "bun install --frozen-lockfile && bun run dev"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
